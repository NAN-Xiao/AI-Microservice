server:
  host: "127.0.0.1"
  port: 9003
  debug: false
  log_to_file: true

service:
  name: "image2psd"

comfyui:
  base_url: "http://127.0.0.1:8188"
  timeout_seconds: 300
  poll_interval_seconds: 1
  # 工作流模板文件（相对于 Image2Psd/ 根目录）
  workflow_path: "resources/workflow.json"
  # 指定上传图片注入到哪个节点的哪个字段
  workflow_input_node_id: "1"
  workflow_input_field: "image"
  # 调用 /prompt 时 client_id（可选）
  client_id: ""

nacos:
  enabled: "true"
  server_addr: "127.0.0.1:8848"
  service_name: "image2psd-service"
  namespace: ""
  group: "DEFAULT_GROUP"
  username: "nacos"
  password: "nacos"
