server:
  port: 8080
  netty:
    max-initial-line-length: 65536
    h2c-max-content-length: 0

spring:
  application:
    name: ai-gateway
  codec:
    max-in-memory-size: 52428800   # 50MB，与nginx的client_max_body_size保持一致
  cloud:                                        # Spring Cloud Gateway 配置             
    gateway:
      httpclient:
        connect-timeout: 10000       # 10秒，连接超时时间
        response-timeout: 600s       # 10分钟，LLM接口响应较慢需足够时间
        pool:
          max-idle-time: 30s         # 最大空闲时间30秒
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
      routes:
        # -------- video_analyze 服务（端口9001）--------
        - id: video-analyze
          uri: http://127.0.0.1:9001
          predicates:
            - Path=/api/video-analyze/**
          filters:
            - name: RequestSize
              args:
                maxSize: 52428800    # 50MB，请求体大小限制

        # -------- ui_builder 服务（端口9002）--------
        - id: ui-builder
          uri: http://127.0.0.1:9002
          predicates:
            - Path=/api/ui-builder/**
          filters:
            - name: RequestSize
              args:
                maxSize: 52428800    # 50MB，请求体大小限制

# --------------------------------------------------
# 上游服务地址（自定义属性，仅做参考）
# 可通过环境变量AGENT_VIDEO_ANALYZE_URL / AGENT_UI_BUILDER_URL覆盖
# --------------------------------------------------
agent:
  video-analyze:
    url: http://127.0.0.1:9001
  ui-builder:
    url: http://127.0.0.1:9002

# Actuator端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway   # 暴露健康、信息及gateway相关端点
  endpoint:
    health:
      show-details: always   # 总是显示健康详情
    gateway:
      enabled: true          # 开启gateway端点

logging:
  level:
    root: INFO
    com.ai.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
