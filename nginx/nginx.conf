worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log;

    # ============================
    # 微服务 upstream（Nginx 直连，无需 Gateway）
    # 多实例部署时在此添加多个 server 实现负载均衡
    # ============================
    # Docker 内部网络: 用容器服务名做 upstream
    # 宿主机部署 Nginx 时改回 127.0.0.1:9001 / 9002
    upstream video_analyze {
        server video-analyze:9001;
        keepalive 16;
    }

    upstream ui_builder {
        server ui-builder:9002;
        keepalive 16;
    }

    server {
        listen 80;
        server_name localhost;

        # ============================
        # HTTPS 配置（按需开启）
        # ============================
        # listen 443 ssl;
        # ssl_certificate     /path/to/cert.pem;
        # ssl_certificate_key /path/to/key.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;
        # ssl_ciphers         HIGH:!aNULL:!MD5;

        # ---------- video-analyze 路由 ----------
        location /api/video-analyze/ {
            proxy_pass http://video_analyze;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 透传客户端的 Authorization 头给 FastAPI 鉴权中间件
            proxy_set_header Authorization $http_authorization;

            proxy_connect_timeout 10s;
            proxy_read_timeout 600s;
            proxy_send_timeout 60s;
        }

        # ---------- ui-builder 路由 ----------
        location /api/ui-builder/ {
            proxy_pass http://ui_builder;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Authorization $http_authorization;

            proxy_connect_timeout 10s;
            proxy_read_timeout 600s;
            proxy_send_timeout 60s;
        }

        # ---------- Nacos 控制台代理（限内网访问）----------
        location /nacos/ {
            proxy_pass http://nacos:8848/nacos/;
            proxy_set_header Host $host;

            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }

        # ---------- Nginx 自身健康检查 ----------
        location /nginx-health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # ---------- 静态资源示例（按需开启）----------
        # location /static/ {
        #     alias /var/www/static/;
        #     expires 7d;
        # }
    }
}
