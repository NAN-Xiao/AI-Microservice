# video_analyze 配置模板
# 复制为 settings.yaml 后填写真实值
# 本服务只读取配置文件，不读取环境变量

server:
  host: "0.0.0.0"
  port: 9001
  debug: false
  log_to_file: true

llm:
  api_url: "https://aikey.elex-tech.com/v1"
  api_key: "replace-with-your-llm-api-key"
  model: "qwen3.5-plus"
  timeout_seconds: 600
  concurrency: 5
  max_retries: 2
  retry_backoff: 2

service:
  # 用于 token 配置监听的 Data ID
  name: "video-analyze"

auth:
  # 逗号分隔，留空表示关闭鉴权
  tokens: ""

nacos:
  enabled: true
  server_addr: "127.0.0.1:8848"
  service_name: "video-analyze-service"
  namespace: ""
  group: "DEFAULT_GROUP"
  username: "nacos"
  password: "nacos"
